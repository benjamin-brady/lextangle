<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap" rel="stylesheet" />
		<title>Lextangle - Word Connection Puzzle</title>
		<meta name="description" content="Lextangle is a daily word puzzle where you arrange words in a grid so that connected words share a hidden relationship." />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Lextangle - Word Connection Puzzle" />
		<meta property="og:description" content="A daily word puzzle where you arrange words in a grid so that connected words share a hidden relationship." />
		<meta property="og:image" content="https://lextangle.com/lextangle1.png" />
		<meta property="og:url" content="https://lextangle.com" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Lextangle - Word Connection Puzzle" />
		<meta name="twitter:description" content="A daily word puzzle where you arrange words in a grid so that connected words share a hidden relationship." />
		<meta name="twitter:image" content="https://lextangle.com/lextangle1.png" />
		<script>
			(function () {
				try {
					var raw = localStorage.getItem('site_theme');
					var choice = raw ? JSON.parse(raw) : 'system';
					var resolved =
						choice === 'system'
							? window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light'
							: choice;
					if (resolved === 'dark') document.documentElement.classList.add('dark');
					document.documentElement.dataset.theme = choice;
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
